window.globalAPlayer || null;




window.initGlobalAPlayer =
function(data){



  const container =
  document.getElementById(
    "music-player"
  );



  if(
    !container ||
    !data ||
    !data.length
  ){

    return;

  }





  if(container._aplayer){

    return;

  }






  const ap =
  new APlayer({



    container:container,



    fixed:true,



    autoplay:false,



    theme:
    '#7cb85c',



    loop:
    'all',



    order:
    'list',



    volume:
    0.7,



    lrcType:
    0,



    audio:data



  });






  container._aplayer =
  ap;



  window.globalAPlayer =
  ap;








  ap.on(
  "play",
  ()=>{



    // 暂停所有文章播放器


    if(
      window.articleAPlayers
    ){


      window.articleAPlayers
      .forEach(player=>{


        if(
          player &&
          player!==ap
        ){

          player.pause();

        }


      });


    }




  });



};









window.loadGlobalMusic =
function(){



  const api =
  'https://api.injahow.cn/meting/?server=netease&type=playlist&id=18138558663&r=0.5014800885995488';






  if(api){



    fetch(api)


    .then(res=>{


      if(!res.ok){

        throw new Error(
          "Global music API error"
        );

      }


      return res.text();



    })



    .then(text=>{


      let data;



      try{


        data =
        JSON.parse(text);



      }catch(e){



        console.error(
          "Global music API returned HTML:",
          text
        );


        return;


      }




      window.initGlobalAPlayer(data);



    })



    .catch(err=>{


      console.error(
        err
      );


    });





  }



  else{



    window.initGlobalAPlayer(
      []
    );



  }



};









document.addEventListener(
"turbo:load",
()=>{



  const box =
  document.getElementById(
    "music-player"
  );




  if(
    box &&
    !box._aplayer
  ){


    window.loadGlobalMusic();


  }



});</script><script data-turbo-eval="false">window.searchLoaded = false;
